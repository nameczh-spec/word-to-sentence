<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API调试测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { color: #333; }
        .test-section {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .test-section h3 {
            margin-top: 0;
            color: #007AFF;
        }
        .log-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .result-box {
            background: #fff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .meaning-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            line-height: 1.6;
            word-wrap: break-word;
            word-break: break-all;
        }
        .meaning-item:last-child {
            border-bottom: none;
        }
        button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 200px;
        }
        .error {
            color: #dc3545;
            background: #fff5f5;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }
        .success {
            color: #28a745;
            background: #f0fff4;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }
        .loading {
            color: #007AFF;
            padding: 10px;
        }
        pre {
            background: #f8f8f8;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>有道词典API调试测试</h1>
    
    <div class="test-section">
        <h3>测试1: 直接调用代理API</h3>
        <input type="text" id="testWord" value="debate" placeholder="输入单词">
        <button onclick="testApi()">测试API</button>
        <button onclick="testApiDirect()">直接测试有道</button>
    </div>
    
    <div class="test-section">
        <h3>控制台日志</h3>
        <div class="log-box" id="logBox">[等待测试...]</div>
    </div>
    
    <div class="test-section">
        <h3>API返回原始数据</h3>
        <pre id="rawData">[等待测试...]</pre>
    </div>
    
    <div class="test-section">
        <h3>解析结果</h3>
        <div id="parsedResult">[等待测试...]</div>
    </div>
    
    <div class="test-section">
        <h3>页面渲染结果</h3>
        <div id="renderResult" class="result-box">[等待测试...]</div>
    </div>

    <script>
        const logBox = document.getElementById('logBox');
        const rawDataEl = document.getElementById('rawData');
        const parsedResultEl = document.getElementById('parsedResult');
        const renderResultEl = document.getElementById('renderResult');
        
        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : '📝';
            const text = `${timestamp} ${prefix} ${msg}`;
            console.log(msg);
            logBox.textContent = text + '\n' + logBox.textContent;
        }
        
        function logRaw(data) {
            rawDataEl.textContent = JSON.stringify(data, null, 2);
        }
        
        // 测试通过代理调用API
        async function testApi() {
            const word = document.getElementById('testWord').value.trim();
            if (!word) {
                log('请输入单词', 'error');
                return;
            }
            
            log(`开始测试代理API，单词: ${word}`);
            renderResultEl.innerHTML = '<div class="loading">⏳ 正在获取权威释义...</div>';
            parsedResultEl.innerHTML = '[解析中...]';
            
            try {
                const apiUrl = `http://localhost:3000/api/youdao?q=${encodeURIComponent(word)}`;
                log(`请求地址: ${apiUrl}`);
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(apiUrl, {
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/json',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                
                const data = await response.json();
                logRaw(data);
                log('API返回数据成功', 'success');
                
                // 解析数据
                const parsed = parseApiData(data);
                parsedResultEl.innerHTML = `<pre>${JSON.stringify(parsed, null, 2)}</pre>`;
                
                // 渲染结果
                renderApiData(parsed);
                
            } catch (e) {
                log(`API请求失败: ${e.message}`, 'error');
                parsedResultEl.innerHTML = `<div class="error">解析失败: ${e.message}</div>`;
                renderResultEl.innerHTML = '<div class="error">❌ 在线词典查询失败，仅显示本地词库内容</div>';
            }
        }
        
        // 直接测试有道词典
        async function testApiDirect() {
            const word = document.getElementById('testWord').value.trim();
            if (!word) {
                log('请输入单词', 'error');
                return;
            }
            
            log(`直接测试有道词典API，单词: ${word}`);
            renderResultEl.innerHTML = '<div class="loading">⏳ 正在获取权威释义...</div>';
            
            try {
                const apiUrl = `https://dict.youdao.com/suggest?q=${encodeURIComponent(word)}&doctype=json`;
                log(`请求地址: ${apiUrl}`);
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(apiUrl, {
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/json',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                
                const data = await response.json();
                logRaw(data);
                log('有道词典返回数据成功', 'success');
                
            } catch (e) {
                log(`有道词典请求失败: ${e.message}`, 'error');
            }
        }
        
        // 解析API数据（与vocabSearch.js中的逻辑一致）
        function parseApiData(data) {
            log('开始解析数据...');
            log(`数据结构: ${JSON.stringify(Object.keys(data || {}))}`);
            
            // 有道词典返回格式：{ result, data: { entries, query, language } }
            if (data.data && data.data.entries && data.data.entries.length > 0) {
                const entries = data.data.entries;
                const queryWord = data.data.query || '';
                
                log(`找到 ${entries.length} 个条目`);
                log(`查询单词: ${queryWord}`);
                
                // 显示所有相关条目（最多显示3个）
                const showEntries = entries.slice(0, 3);
                
                log('解析成功', 'success');
                return {
                    word: queryWord,
                    entries: showEntries,
                    meanings: []
                };
            }
            
            log('未能解析数据，返回null', 'error');
            return null;
        }
        
        // 渲染API数据（与vocabSearch.js中的逻辑一致）
        function renderApiData(data) {
            log('开始渲染数据...');
            
            if (!data) {
                renderResultEl.innerHTML = '<div class="error">❌ 暂无详细释义</div>';
                return;
            }
            
            // 显示所有条目
            if (data.entries && data.entries.length > 0) {
                let html = '';
                
                for (const entry of data.entries) {
                    const word = entry.entry || '';
                    const explain = entry.explain || '';
                    
                    if (explain) {
                        html += `<div class="meaning-item"><strong>${word}</strong> ${explain}</div>`;
                    }
                }
                
                renderResultEl.innerHTML = html;
                log('渲染完成', 'success');
            } else {
                renderResultEl.innerHTML = '<div class="error">❌ 暂无详细释义</div>';
                log('没有可渲染的内容', 'error');
            }
        }
        
        // 页面加载时自动测试
        window.onload = function() {
            log('页面加载完成，准备测试...');
        };
    </script>
</body>
</html>
